<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IronTrack</title>
<link rel="stylesheet" href="_style.css"/>
<style>
body{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;padding:0}
.left-panel{
  background:var(--bg2);border-right:1px solid var(--wire);
  padding:52px 52px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
/* wave bg on left */
.left-panel::after{
  content:'';display:none;
}
.brand{
  font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;
  letter-spacing:.5px;color:var(--cream);margin-bottom:60px;
  display:flex;align-items:baseline;gap:1px;
}
.brand span{color:var(--t2);font-style:italic}
.left-headline{
  font-family:'Instrument Serif',serif;
  font-size:62px;font-weight:400;line-height:.9;
  letter-spacing:-1px;color:var(--t0);margin-bottom:20px;
}
.left-headline em{font-style:italic;color:var(--cream)}
.left-sub{font-size:15px;color:var(--t2);line-height:1.65;max-width:320px}
.left-stats{display:flex;gap:36px;position:relative;z-index:1}
.ls-n{font-family:'Instrument Serif',serif;font-size:40px;font-weight:400;color:var(--cream);line-height:1;letter-spacing:-1px}
.ls-l{font-size:12px;color:var(--t3);margin-top:4px}

.right-panel{display:flex;align-items:center;justify-content:center;padding:40px 52px;background:var(--bg)}
.form-box{width:100%;max-width:360px}
.tab-row{display:flex;margin-bottom:36px;border-bottom:1px solid var(--wire2)}
.tab-btn{
  flex:1;padding:10px 0;background:transparent;border:none;border-bottom:2px solid transparent;
  margin-bottom:-1px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  color:var(--t3);cursor:pointer;transition:all .15s;
}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{color:var(--cream);border-bottom-color:var(--cream)}
.msg{padding:11px 14px;border-radius:10px;font-size:14px;margin-bottom:18px;display:none;line-height:1.5}
.msg.error{background:rgba(217,112,112,.07);border:1px solid rgba(217,112,112,.2);color:var(--red)}
.msg.success{background:rgba(109,191,138,.07);border:1px solid rgba(109,191,138,.2);color:var(--green)}
.field{margin-bottom:14px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.submit{
  width:100%;margin-top:6px;padding:13px;
  background:var(--cream);color:var(--bg);border:none;border-radius:10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;letter-spacing:.3px;
  transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit:hover{background:var(--cream2)}
.submit:disabled{opacity:.4;cursor:not-allowed}
.hint{margin-top:16px;font-size:13px;color:var(--t3);text-align:center}
.hint a{color:var(--t1);text-decoration:none;border-bottom:1px solid var(--wire2);transition:color .15s,border-color .15s}
.hint a:hover{color:var(--cream);border-color:var(--cream)}
@media(max-width:820px){
  body{grid-template-columns:1fr}
  .left-panel{display:none}
  .right-panel{min-height:100vh;padding:48px 24px}
  .form-box{max-width:100%}
  .submit{min-height:44px;font-size:15px}
}
@media(max-width:480px){
  .right-panel{padding:32px 16px}
  .form-box{max-width:100%}
  .tab-row{margin-bottom:28px}
  .tab-btn{padding:12px 0;font-size:13px;min-height:44px}
  .field{margin-bottom:12px}
  .field label{font-size:10px;margin-bottom:6px}
  input{font-size:16px;padding:12px 12px;min-height:44px}
  .submit{padding:12px;font-size:14px;min-height:44px}
  .msg{padding:10px 12px;font-size:13px}
  .hint{margin-top:14px;font-size:12px}
}
</style>
</head>
<body>
<div class="left-panel">
  <div>
    <div class="brand">Iron<span>Track</span></div>
    <div class="left-headline">Трекай.<br><em>Расти.</em><br>Повтори.</div>
    <p class="left-sub">Записывай тренировки, следи за едой, фиксируй рекорды — и получай от ИИ конкретные советы.</p>
  </div>
  <div class="left-stats">
    <div><div class="ls-n">7</div><div class="ls-l">дней в неделю</div></div>
    <div><div class="ls-n">∞</div><div class="ls-l">своих блюд</div></div>
    <div><div class="ls-n">ИИ</div><div class="ls-l">анализ данных</div></div>
  </div>
</div>
<div class="right-panel">
  <div class="form-box">
    <div class="tab-row">
      <button class="tab-btn active" onclick="showTab('login')">Войти</button>
      <button class="tab-btn" onclick="showTab('reg')">Новый аккаунт</button>
    </div>
    <div id="msg" class="msg"></div>
    <div id="f-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@gmail.com"/></div>
      <div class="field"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="submit" id="l-btn" onclick="doLogin()">Войти</button>
      <p class="hint">Ещё нет аккаунта? <a href="#" onclick="showTab('reg')">Создай</a></p>
    </div>
    <div id="f-reg" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@gmail.com"/></div>
      <div class="field"><label>Пароль</label><input type="password" id="r-pass" placeholder="6+ символов"/></div>
      <div class="field"><label>Повтори пароль</label><input type="password" id="r-pass2" placeholder="ещё раз" onkeydown="if(event.key==='Enter')doReg()"/></div>
      <button class="submit" id="r-btn" onclick="doReg()">Создать аккаунт</button>
      <p class="hint">Уже есть? <a href="#" onclick="showTab('login')">Войти</a></p>
    </div>
  </div>
</div>
<script src="_supabase.js"></script>
<script>
if(getToken()&&getUser())window.location.href='index.html';
function showTab(t){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='login'&&i===0)||(t==='reg'&&i===1)));document.getElementById('f-login').style.display=t==='login'?'block':'none';document.getElementById('f-reg').style.display=t==='reg'?'block':'none';document.getElementById('msg').style.display='none';}
function showMsg(txt,tp='error'){const el=document.getElementById('msg');el.textContent=txt;el.className='msg '+tp;el.style.display='block';}
function setLoad(id,on,lbl){const b=document.getElementById(id);b.disabled=on;b.innerHTML=on?'<div class="spin"></div>':lbl;}
async function doLogin(){const em=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pass').value;if(!em||!pw)return showMsg('Заполни оба поля');setLoad('l-btn',true);try{await signIn(em,pw);window.location.href='index.html';}catch(e){showMsg(e.message.includes('Invalid')?'Неверный email или пароль':e.message);setLoad('l-btn',false,'Войти');}}
async function doReg(){const em=document.getElementById('r-email').value.trim(),pw=document.getElementById('r-pass').value,pw2=document.getElementById('r-pass2').value;if(!em||!pw)return showMsg('Заполни все поля');if(pw.length<6)return showMsg('Пароль — минимум 6 символов');if(pw!==pw2)return showMsg('Пароли не совпадают');setLoad('r-btn',true);try{const d=await signUp(em,pw);if(d.access_token)window.location.href='index.html';else{showMsg('Готово — теперь войди','success');setTimeout(()=>showTab('login'),1500);}}catch(e){showMsg(e.message.includes('registered')?'Этот email уже зарегистрирован':e.message);}finally{setLoad('r-btn',false,'Создать аккаунт');}}
</script>
<script>
(function(){
  function navigate(url){
    document.body.classList.add('leaving');
    setTimeout(function(){ window.location.href = url; }, 180);
  }
  document.addEventListener('click', function(e){
    var a = e.target.closest('a');
    if(!a) return;
    var href = a.getAttribute('href');
    if(!href || href.charAt(0)==='#' || href.startsWith('http') || href.startsWith('mailto') || a.target==='_blank') return;
    e.preventDefault();
    navigate(href);
  });
})();
</script>

</body>
</html>
